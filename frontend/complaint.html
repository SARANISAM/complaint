<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESOLVE | Complaint Management</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
</head>
<body>

<div class="container">
  <h1 id="title">Complaint Details</h1>
  <p id="desc"></p>

  <div id="currentStatus" class="status-summary"></div>

  <div id="progressTracker" class="progress-tracker"></div>

  <h2>Status Timeline</h2>
  <div id="timeline"></div>

  <h2>Resolution</h2>
  <div id="resolution"></div>
</div>

<hr>

<h2>Give Feedback</h2>

<select id="rating">
  <option value="1">1 ⭐</option>
  <option value="2">2 ⭐</option>
  <option value="3">3 ⭐</option>
  <option value="4">4 ⭐</option>
  <option value="5">5 ⭐</option>
</select>

<br><br>

<textarea id="comment" placeholder="Write your feedback"></textarea>

<br><br>

<button onclick="submitFeedback()">Submit Feedback</button>

<hr>

<h2>User Feedback</h2>
<div id="feedbackList"></div>

<!-- JS connection -->
<script type="module" src="js/complaint.js"></script>

<!-- GSAP animation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
gsap.from(".container", {
  y: 20,
  opacity: 0,
  duration: 0.6
});
</script>
<script src="js/animations.js"></script>
</body>
