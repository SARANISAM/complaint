<!DOCTYPE html>
<html>
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESOLVE | Complaint Management</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">
</head>

<body>
<div class="container login-box">
  <h1>Complaint Portal</h1>
  <p>Every voice deserves resolution</p>

  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>

  <select id="role">
    <option value="user">User</option>
    <option value="admin">Admin</option>
  </select><br><br>

  <button class="btn" onclick="login()">Login</button>
  <p>Don't have an account? <a href="register.html">Sign up</a></p>
</div>

<script type="module" src="js/auth.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
gsap.from(".login-box", { y: 30, opacity: 0, duration: 1 });
</script>
<script src="js/animations.js"></script>
</body>
</html>
