<!DOCTYPE html>
<html>
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESOLVE | Complaint Management</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

  <title>Register</title>

  
</head>

<body>

<div class="container login-box">
  <h1>Create Account</h1>
  <p>Join the complaint resolution system</p>

  <input id="name" placeholder="Full Name"><br><br>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
<p>Select role to create account (User/Admin)</p>
<select id="role">
  <option value="user">User</option>
  <option value="admin">Admin</option>
</select><br><br>
  

  <!-- Department (only for admin) -->
  <select id="department" style="display:none;"></select><br><br>

  <button class="btn" onclick="register()">Register</button>

  <p>Already have an account? <a href="index.html">Login</a></p>
</div>

<!-- ✅ CONNECT JS FILE -->
<script type="module" src="js/register.js"></script>

<!-- GSAP Animation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
gsap.from(".login-box", {
  y: 30,
  opacity: 0,
  duration: 1,
  ease: "power3.out"
});

<script src="js/animations.js"></script>

</body>
</html>
